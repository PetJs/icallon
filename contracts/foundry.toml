[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.24"

# Optimizer — enable for deploy, disable for faster test iteration
optimizer        = true
optimizer_runs   = 200
via_ir           = true

# Monad Testnet RPC for forge script / cast
[rpc_endpoints]
monad_testnet = "https://testnet-rpc.monad.xyz"

# Etherscan-compatible explorer (Monad uses Sourcify / custom explorer)
[etherscan]
monad_testnet = { key = "${MONAD_EXPLORER_KEY}", url = "https://testnet.monadexplorer.com/api" }
